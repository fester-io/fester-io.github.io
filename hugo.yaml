baseURL: 'https://fester-io.github.io/'
title: Sakiina
locale: en-us
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Sakiina
  og_image: /images/og-image.png
  description: "Portfolio website"
  disable_theme_toggle: false

  # Fallback only — edit the homepage hero text in content/_index.md instead
  hero:
    greeting: "Hi, I'm"
    name: "Sakiina"
    tagline: "Welcome to my portfolio"
    description: "I create things and share my work here."

  social_media:
    github:
      enabled: true
      url: 'https://github.com/fester-io'
    linkedin:
      enabled: false
      url: ''
    instagram:
      enabled: false
      url: ''
    twitter:
      enabled: false
      url: ''

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: resume
      name: Resume
      url: /resume/
      weight: 30
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 40
  footer:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 30

module:
  hugoVersion:
    extended: true
    min: "0.148.2"
