<a href="{{ .RelPermalink }}" class="group flex flex-col overflow-hidden bg-white dark:bg-gray-800/60 rounded-2xl border border-gray-200 dark:border-gray-700/60 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
    {{ with .Params.image }}
    <div class="aspect-video overflow-hidden bg-gray-100 dark:bg-gray-700">
        <img src="{{ . }}" alt="{{ $.Title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy" />
    </div>
    {{ else }}
    <div class="aspect-video flex items-center justify-center bg-gradient-to-br from-primary-500 via-primary-600 to-secondary-500 dark:from-primary-700 dark:via-primary-800 dark:to-secondary-800">
        <span class="text-6xl font-extrabold text-white/70 select-none">{{ substr .Title 0 1 }}</span>
    </div>
    {{ end }}
    <div class="flex flex-col flex-1 p-6">
        <h3 class="text-xl font-semibold text-gray-900 dark:text-white group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">
            {{ .Title }}
        </h3>
        {{ with .Params.description }}
        <p class="mt-2 text-gray-600 dark:text-gray-400">{{ . }}</p>
        {{ end }}
        {{ with .Params.tags }}
        <div class="mt-auto pt-5 flex flex-wrap gap-2">
            {{ range . }}
            <span class="px-2.5 py-1 text-xs font-medium text-primary-700 dark:text-primary-300 bg-primary-50 dark:bg-primary-900/30 rounded-full">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </div>
</a>
