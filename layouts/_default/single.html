{{ define "main" }}
<main class="px-4 py-12 mx-auto max-w-screen-xl sm:py-16">
    <article class="mx-auto max-w-3xl">
        <h1 class="text-4xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-5xl">
            {{ .Title }}
        </h1>
        <div class="mt-4 h-1 w-16 rounded-full bg-gradient-to-r from-primary-500 to-secondary-500"></div>
        {{ with .Params.description }}
        <p class="mt-5 text-xl text-gray-600 dark:text-gray-400">{{ . }}</p>
        {{ end }}
        <div class="mt-8 prose dark:prose-invert prose-2xl">
            {{ .Content }}
        </div>
    </article>
</main>
{{ end }}
